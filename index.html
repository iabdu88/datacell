<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <meta name="description" content="DataCell — منصة تنظيف وتحليل البيانات." />
  <title>DataCell — نظّف بياناتك</title>
  
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./src/styles/main.css" />
  
  <style>
    /* تأكيد إخفاء الشاشات غير النشطة */
    .screen { display: none; }
    .screen.active { display: block; }
  </style>
</head>
<body>

  <section class="screen active" id="screen-landing">
    <div class="hero">
      <div class="hero-logo">DataCell</div>
      <div class="tagline">نظّف بياناتك. افهم أرقامك. في ثوانٍ.</div>

      <div class="drop-zone" id="drop-zone"
           ondragover="event.preventDefault(); this.classList.add('dragover')"
           ondragleave="this.classList.remove('dragover')"
           ondrop="handleDrop(event)"
           onclick="document.getElementById('file-input').click()">
        <div class="drop-icon">📂</div>
        <h3>اسحب ملفك هنا</h3>
        <p>أو انقر للاختيار (Excel, CSV)</p>
        <button class="btn-primary" type="button">اختر ملفاً</button>
      </div>
      <input type="file" id="file-input" accept=".csv,.xlsx,.xls" style="display:none" onchange="handleFile(event)">
    </div>
  </section>

  <section class="screen" id="screen-processing">
    <div class="processing-content">
      <div class="spinner-logo">⟳</div>
      <h2>جاري فحص البيانات...</h2>
      <div class="progress-bar-outer">
        <div class="progress-bar-inner" id="progress-bar"></div>
      </div>
    </div>
  </section>

  <section class="screen" id="screen-diagnosis">
    <div class="card">
      <div class="card-title">👁️ معاينة أولية للبيانات</div>
      <p class="card-subtitle">تأكد من صحة الأعمدة قبل البدء في عملية التنظيف.</p>
      
      <div class="data-table-wrap">
        <table class="data-table" id="preview-table">
          </table>
      </div>

      <div class="action-bar">
        <button class="btn-secondary" onclick="resetAll()">رفع ملف آخر</button>
        <button class="btn-primary" onclick="startCleaning()">ابدأ التنظيف والتحليل ➔</button>
      </div>
    </div>
  </section>

  <section class="screen" id="screen-cleaning">
    <div class="processing-content">
      <div class="loader-ring"></div>
      <h2>جاري تنظيف وتوحيد البيانات</h2>
      <p>تمت معالجة <span id="cleaning-counter">0</span> سجل حتى الآن...</p>
    </div>
  </section>

  <section class="screen" id="screen-insights">
    <div class="results-grid">
      <div class="card">
        <h3>النتائج النهائية</h3>
        <div class="data-table-wrap">
          <table class="data-table" id="clean-table-after"></table>
        </div>
        <button class="btn-primary" onclick="resetAll()">إنهاء وحفظ النتائج</button>
      </div>
    </div>
  </section>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <script src="/datacell.js"></script>

</body>
</html>

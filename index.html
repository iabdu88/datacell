<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <meta name="description" content="DataCell — منصة تنظيف وتحليل البيانات للشركات السعودية الصغيرة والمتوسطة. رفع ملف CSV أو Excel وتنظيفه في ثوانٍ." />
  <title>DataCell — نظّف بياناتك</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <link rel="stylesheet" href="./src/styles/main.css" />
  <style>
    /* إضافة لمسة فخامة تناسب نسخة الجوال ومنع الرموز الغريبة */
    body { font-family: 'Tajawal', sans-serif; background-color: #0f172a; color: #f8fafc; }
    .data-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    table { width: 100%; border-collapse: collapse; text-align: right; }
    /* تحسين شكل التذييل ليكون متناسقاً مع سدايا */
    .sdaia-footer { background: rgba(0,0,0,0.3); padding: 20px; text-align: center; border-top: 1px solid #334155; }
    .sdaia-badge-ft { background: #1e293b; padding: 4px 10px; border-radius: 6px; margin: 0 5px; font-size: 0.8rem; }
  </style>
</head>
<body>

<div class="aurora"></div>

<canvas id="confetti-canvas"></canvas>

<button id="chat-btn" onclick="toggleChat()" aria-label="AI Chat">🤖</button>

<div id="chat-panel">
  <div class="chat-header">
    <span class="chat-title">اسألني عن بياناتك 🤖</span>
    <button class="btn-close-chat" onclick="toggleChat()">✕</button>
  </div>
  <div class="chat-messages" id="chat-messages">
    <div class="msg-bubble msg-ai">مرحباً! اسألني أي سؤال عن بياناتك 📊</div>
  </div>
  <div class="chat-input-row">
    <input type="text" class="chat-input" id="chat-input" placeholder="اكتب سؤالك..." />
    <button class="btn-send" onclick="sendChat()">➤</button>
  </div>
</div>

<section class="screen active" id="screen-landing">
  <nav class="nav">
    <div class="logo-text">DataCell</div>
    <div class="nav-actions">
      <button class="btn-lang" onclick="toggleLang()">EN</button>
    </div>
  </nav>
  <div class="hero">
    <div class="hero-logo">DataCell</div>
    <div class="tagline" data-ar="نظّف بياناتك. افهم أرقامك. في ثوانٍ.">نظّف بياناتك. افهم أرقامك. في ثوانٍ.</div>

    <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
      <div class="drop-icon">📂</div>
      <h3>اسحب ملفك هنا</h3>
      <p>أو انقر للاختيار (Excel, CSV)</p>
      <div class="formats-badge"><span>CSV</span><span>•</span><span>XLSX</span></div>
      <button class="btn-primary" type="button">اختر ملفاً</button>
    </div>
    <input type="file" id="file-input" accept=".csv,.xlsx,.xls" style="display:none" onchange="handleFile(event)">
  </div>
</section>

<section class="screen" id="screen-diagnosis">
  <div class="card">
    <div class="card-title">👁️ معاينة البيانات (حل مشكلة الرموز العربية)</div>
    <div class="data-table-wrap">
      <table class="data-table" id="preview-table"></table>
    </div>
    <button class="btn-primary" onclick="startCleaning()" style="margin-top:20px">✨ نظّف كل شيء تلقائياً</button>
  </div>
</section>

<footer class="sdaia-footer">
  <div class="sdaia-footer-inner">
    <span>DataCell &copy; 2026 Abdu Abdella Ahmed</span>
    <span class="sdaia-sep">|</span>
    <span>مُطابق لمتطلبات</span>
    <span class="sdaia-badge-ft">🛡️ سدايا / SDAIA</span>
    <span class="sdaia-badge-ft">📋 PDPL</span>
  </div>
</footer>

<script>
// الوظيفة الأساسية لقراءة الملف بدون رموز غريبة
function handleFile(event) {
    const file = event.target.files[0];
    if (!file) return;

    // إظهار شاشة المعالجة (اختياري حسب الـ CSS عندك)
    // showScreen('processing');

    const reader = new FileReader();
    
    // الحل السحري للرموز الغريبة: قراءة الملف كـ ArrayBuffer
    reader.onload = function(e) {
        try {
            const data = new Uint8Array(e.target.result);
            
            // إضافة خاصية codepage لضمان دعم العربية (65001 = UTF-8)
            const workbook = XLSX.read(data, { 
                type: 'array',
                codepage: 65001 
            });

            const firstSheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[firstSheetName];
            
            // تحويل الشيت إلى JSON مع الحفاظ على النصوص كما هي
            const json = XLSX.utils.sheet_to_json(worksheet, { defval: "" });

            if (json.length > 0) {
                renderPreviewTable(json.slice(0, 10)); // عرض أول 10 صفوف
                showScreen('diagnosis');
            }
        } catch (err) {
            console.error(err);
            alert("حدث خطأ أثناء قراءة الملف العربي، تأكد من ترميز الملف.");
        }
    };
    
    reader.readAsArrayBuffer(file);
}

function renderPreviewTable(data) {
    const table = document.getElementById('preview-table');
    const headers = Object.keys(data[0]);
    
    let html = "<thead><tr>";
    headers.forEach(h => html += `<th>${h}</th>`);
    html += "</tr></thead><tbody>";
    
    data.forEach(row => {
        html += "<tr>";
        headers.forEach(h => html += `<td>${row[h]}</td>`);
        html += "</tr>";
    });
    
    html += "</tbody>";
    table.innerHTML = html;
}

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + id).classList.add('active');
}

function toggleChat() {
    const panel = document.getElementById('chat-panel');
    panel.style.display = (panel.style.display === 'flex') ? 'none' : 'flex';
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
    <title>DataCell — احترافية تنظيف البيانات</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --text: #1e293b;
        }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 0; line-height: 1.6; }
        .screen { display: none; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .screen.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        /* الهوية البصرية والـ Hero */
        .hero-logo { font-size: 2.5rem; font-weight: 800; color: var(--primary); margin-bottom: 10px; }
        .tagline { font-size: 1.2rem; color: #64748b; margin-bottom: 40px; text-align: center; }

        /* منطقة الرفع */
        .drop-zone {
            width: 100%; max-width: 600px; height: 250px;
            border: 2px dashed #cbd5e1; border-radius: 16px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: white; cursor: pointer; transition: all 0.3s ease;
        }
        .drop-zone:hover, .drop-zone.dragover { border-color: var(--primary); background: #eff6ff; }
        .drop-icon { font-size: 3rem; margin-bottom: 15px; }

        /* الأزرار والجداول */
        .btn-primary { background: var(--primary); color: white; border: none; padding: 12px 30px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 1rem; }
        .data-table-wrap { width: 100%; max-width: 900px; overflow-x: auto; background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); margin: 20px 0; }
        table { width: 100%; border-collapse: collapse; text-align: right; }
        th, td { padding: 12px; border-bottom: 1px solid #e2e8f0; white-space: nowrap; }
        th { background: #f1f5f9; font-weight: 700; }

        /* التذييل (سدايا وحماية البيانات) */
        footer { margin-top: auto; padding: 40px 20px; text-align: center; width: 100%; }
        .legal-box { display: flex; justify-content: center; gap: 20px; margin-bottom: 15px; font-weight: 600; font-size: 0.85rem; color: #475569; }
        .legal-item { display: flex; align-items: center; gap: 5px; background: white; padding: 5px 15px; border-radius: 20px; border: 1px solid #e2e8f0; }

        /* الأنيميشن */
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <section class="screen active" id="screen-landing">
        <div class="hero-logo">DataCell</div>
        <div class="tagline">نظّف بياناتك. افهم أرقامك. في ثوانٍ.</div>

        <div class="drop-zone" id="drop-zone" 
             ondragover="event.preventDefault(); this.classList.add('dragover')"
             ondragleave="this.classList.remove('dragover')"
             ondrop="handleDrop(event)"
             onclick="document.getElementById('file-input').click()">
            <div class="drop-icon">📊</div>
            <h3>اسحب ملف الإكسل هنا</h3>
            <p>أو انقر لاختيار ملف من جهازك</p>
            <button class="btn-primary">اختيار ملف</button>
        </div>
        <input type="file" id="file-input" accept=".csv,.xlsx,.xls" style="display:none" onchange="handleFile(event)">

        <footer>
            <div class="legal-box">
                <div class="legal-item">🇸🇦 متوافق مع معايير SDAIA</div>
                <div class="legal-item">🔒 حماية البيانات الشخصية</div>
            </div>
            <p>© 2026 DataCell - جميع الحقوق محفوظة</p>
        </footer>
    </section>

    <section class="screen" id="screen-processing">
        <div class="loader"></div>
        <h2 style="margin-top: 20px;">جاري تحليل الملف...</h2>
    </section>

    <section class="screen" id="screen-diagnosis">
        <h2>👁️ معاينة البيانات</h2>
        <div class="data-table-wrap">
            <table id="preview-table"></table>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="btn-primary" style="background: #64748b;" onclick="location.reload()">إلغاء</button>
            <button class="btn-primary" onclick="startCleaning()">ابدأ عملية التنظيف الآن ➔</button>
        </div>
    </section>

    <section class="screen" id="screen-insights">
        <h2>✅ تم تنظيف البيانات بنجاح</h2>
        <div class="data-table-wrap">
            <table id="result-table"></table>
        </div>
        <button class="btn-primary" onclick="location.reload()">رفع ملف جديد</button>
    </section>

    <script>
        let rawData = [];

        // معالجة الملف
        function handleFile(event) {
            const file = event.target.files ? event.target.files[0] : (event.dataTransfer ? event.dataTransfer.files[0] : null);
            if (!file) return;

            showScreen('processing');

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const sheetName = workbook.SheetNames[0];
                    const json = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName], { defval: "" });

                    if (json.length > 0) {
                        rawData = json;
                        setTimeout(() => {
                            showScreen('diagnosis');
                            renderTable('preview-table', rawData.slice(0, 10));
                        }, 1000);
                    }
                } catch (err) {
                    alert("عذراً، حدث خطأ في قراءة الملف.");
                    location.reload();
                }
            };
            reader.readAsArrayBuffer(file);
        }

        // التنقل بين الشاشات
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + id).classList.add('active');
        }

        // عرض الجداول
        function renderTable(tableId, data) {
            const table = document.getElementById(tableId);
            const headers = Object.keys(data[0]);
            let html = `<thead><tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr></thead>`;
            html += `<tbody>${data.map(row => `<tr>${headers.map(h => `<td>${row[h]}</td>`).join('')}</tr>`).join('')}</tbody>`;
            table.innerHTML = html;
        }

        // وظائف إضافية
        function startCleaning() {
            showScreen('processing');
            setTimeout(() => {
                showScreen('insights');
                renderTable('result-table', rawData.slice(0, 10));
            }, 1500);
        }

        function handleDrop(e) {
            e.preventDefault();
            document.getElementById('drop-zone').classList.remove('dragover');
            handleFile(e);
        }

        // ربط الدوال بالنافذة
        window.handleFile = handleFile;
        window.handleDrop = handleDrop;
        window.startCleaning = startCleaning;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataCell — احترافية تنظيف البيانات</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg: #0f172a; /* الأسود الفخم */
            --card-bg: #1e293b;
            --primary: #38bdf8; /* الأزرق السماوي التقني */
            --text: #f8fafc;
        }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        .screen { display: none; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; flex-grow: 1; }
        .screen.active { display: flex; }

        /* الهوية البصرية */
        .hero-logo { font-size: 3rem; font-weight: 900; background: linear-gradient(to left, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        .tagline { color: #94a3b8; margin-bottom: 40px; font-size: 1.1rem; }

        /* منطقة الرفع */
        .drop-zone {
            width: 100%; max-width: 650px; height: 280px;
            border: 2px dashed #334155; border-radius: 24px;
            background: var(--card-bg); display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }
        .drop-zone:hover { border-color: var(--primary); transform: translateY(-5px); }
        .drop-icon { font-size: 4rem; filter: drop-shadow(0 0 10px var(--primary)); }

        /* الجداول والأزرار */
        .data-table-wrap { width: 100%; max-width: 1000px; overflow-x: auto; background: #0f172a; border-radius: 12px; border: 1px solid #334155; margin: 20px 0; }
        table { width: 100%; border-collapse: collapse; text-align: right; font-size: 0.9rem; }
        th { background: #334155; color: var(--primary); padding: 15px; }
        td { padding: 12px; border-bottom: 1px solid #1e293b; color: #cbd5e1; }
        .btn { background: var(--primary); color: #0f172a; border: none; padding: 14px 35px; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn:hover { opacity: 0.9; transform: scale(1.05); }

        /* التذييل */
        footer { padding: 30px; text-align: center; background: rgba(15, 23, 42, 0.9); border-top: 1px solid #1e293b; }
        .legal-tags { display: flex; justify-content: center; gap: 15px; margin-bottom: 10px; }
        .tag { background: #1e293b; padding: 5px 15px; border-radius: 50px; font-size: 0.8rem; border: 1px solid #334155; }
    </style>
</head>
<body>

    <section class="screen active" id="screen-landing">
        <div class="hero-logo">DataCell</div>
        <div class="tagline">نظّف بياناتك. افهم أرقامك. بدقة محاسبية متناهية.</div>
        <div class="drop-zone" onclick="document.getElementById('file-input').click()">
            <div class="drop-icon">🚀</div>
            <h3>ارفع ملف الإكسل هنا</h3>
            <p style="color: #64748b;">(XLSX, CSV, XLS)</p>
            <button class="btn">اختر الملف</button>
        </div>
        <input type="file" id="file-input" style="display:none" onchange="handleFile(event)">
        <footer>
            <div class="legal-tags">
                <span class="tag">🇸🇦 متوافق مع SDAIA</span>
                <span class="tag">🔒 حماية البيانات الشخصية</span>
            </div>
            <p>© 2026 DataCell - تم التطوير بدقة واحترافية</p>
        </footer>
    </section>

    <section class="screen" id="screen-processing">
        <div class="hero-logo" id="proc-text">جاري التحليل...</div>
        <div style="width: 300px; height: 4px; background: #1e293b; border-radius: 10px;">
            <div id="progress" style="width: 0%; height: 100%; background: var(--primary); transition: 1s;"></div>
        </div>
    </section>

    <section class="screen" id="screen-result">
        <h2 id="result-title">👁️ معاينة البيانات</h2>
        <div class="data-table-wrap"><table id="main-table"></table></div>
        <div style="display:flex; gap:15px;">
            <button class="btn" style="background:#475569;" onclick="location.reload()">إلغاء</button>
            <button class="btn" id="clean-btn" onclick="applyCleaning()">تنظيف البيانات فوراً ➔</button>
        </div>
    </section>

    <script>
        let rawData = [];
        function handleFile(e) {
            const file = e.target.files[0];
            if (!file) return;
            showScreen('processing');
            document.getElementById('progress').style.width = '100%';
            const reader = new FileReader();
            reader.onload = function(evt) {
                const workbook = XLSX.read(new Uint8Array(evt.target.result), {type: 'array'});
                rawData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {defval: ""});
                setTimeout(() => { showScreen('result'); render(rawData); }, 1200);
            };
            reader.readAsArrayBuffer(file);
        }

        function applyCleaning() {
            showScreen('processing');
            document.getElementById('proc-text').innerText = "جاري التنظيف...";
            // منطق تنظيف حقيقي
            const cleaned = rawData.map(row => {
                let newRow = {};
                for (let k in row) {
                    let val = row[k];
                    if (typeof val === 'string') {
                        val = val.trim(); // حذف الفراغات
                        val = val.replace(/[^\w\s\u0600-\u06FF]/gi, ''); // حذف الرموز الغريبة مع الحفاظ على العربي
                    }
                    newRow[k] = val;
                }
                return newRow;
            });
            setTimeout(() => {
                showScreen('result');
                document.getElementById('result-title').innerText = "✅ البيانات بعد التنظيف";
                document.getElementById('clean-btn').innerText = "تحميل الملف النظيف";
                document.getElementById('clean-btn').onclick = () => exportFile(cleaned);
                render(cleaned);
            }, 1500);
        }

        function render(data) {
            const table = document.getElementById('main-table');
            const head = Object.keys(data[0]);
            let html = `<thead><tr>${head.map(h => `<th>${h}</th>`).join('')}</tr></thead>`;
            html += `<tbody>${data.slice(0,10).map(r => `<tr>${head.map(h => `<td>${r[h]}</td>`).join('')}</tr>`).join('')}</tbody>`;
            table.innerHTML = html;
        }

        function exportFile(data) {
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "CleanData");
            XLSX.writeFile(wb, "DataCell_Cleaned.xlsx");
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + id).classList.add('active');
        }
    </script>
</body>
</html>
